name: CI

on:
  push:
    branches: [dev]
  pull_request:
    branches: [dev]

jobs:
  build:
    name: ${{ matrix.distro }}
    runs-on: ubuntu-latest
    container: ${{ matrix.container }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - distro: Ubuntu
            container: ubuntu:latest
            deps: apt-get update && apt-get install -y curl build-essential pkg-config libxdp-dev clang
          - distro: Fedora
            container: fedora:latest
            deps: dnf install -y curl gcc make pkg-config libxdp-devel clang
          - distro: Arch
            container: archlinux:latest
            deps: pacman -Syu --noconfirm curl base-devel pkgconf libxdp clang

    steps:
      - name: Install system dependencies
        run: ${{ matrix.deps }}

      - uses: actions/checkout@v4

      - name: Install Rust
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y \
            --default-toolchain 1.88.0 \
            --profile minimal \
            --component clippy
          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"

      - name: Install nightly (for fmt)
        run: rustup toolchain install nightly --component rustfmt

      - name: Install just
        run: cargo install just

      - name: Install lint tools
        run: |
          cargo install cargo-machete
          cargo install cargo-sort

      - name: Build
        run: just build

      - name: Lint
        run: just lint
